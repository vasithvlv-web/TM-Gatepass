<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OneStop GatePass Matrix Suite</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="globalLoader"><div class="loader-ring"></div></div>
<div class="toast-stack" id="toastStack"></div>
<div id="sidebarOverlay" onclick="closeSidebar()"></div>

<div id="authContainer">
  <div class="auth-card">
    <div class="text-center mb-4">
      <div class="auth-logo-ring"><i class="fas fa-shield-alt"></i></div>
      <h3 class="mb-1">OneStop Portal</h3>
      <p class="mb-3 text-muted">Gate Control & Management System</p>
    </div>
    <form id="loginForm" onsubmit="executeLogin(event)">
      <div class="mb-3">
        <label class="form-label font-monospace" style="font-size:12px; text-transform:uppercase; letter-spacing:1px;">Username</label>
        <input type="text" id="loginUser" class="form-control" required placeholder="Enter username">
      </div>
      <div class="mb-4">
        <label class="form-label font-monospace" style="font-size:12px; text-transform:uppercase; letter-spacing:1px;">Password</label>
        <input type="password" id="loginPass" class="form-control" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-brand w-100 py-2.5">Authenticate</button>
    </form>
  </div>
</div>

<div id="appContainer" style="display:none;"></div>

<div class="modal fade" id="passModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title d-flex align-items-center gap-2" id="passModalTitle">
          <i class="fas fa-plus-circle text-brand"></i> <span>Create New Gate Pass</span>
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="passForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label required-field">Pass Type</label>
              <select class="form-select" id="p_passType" required onchange="togglePassTypeFields()">
                <option value="GOODS">Goods Pass (In/Out)</option>
                <option value="VISITOR">Visitor / Labor Pass</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">Direction</label>
              <select class="form-select" id="p_direction" required>
                <option value="IN">INBOUND (Entry)</option>
                <option value="OUT">OUTBOUND (Exit)</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">Company / Party Name</label>
              <input type="text" class="form-control" id="p_partyName" required placeholder="Transmech LLC / Vendor Name">
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">Requester Name / Dept</label>
              <input type="text" class="form-control" id="p_requester" required placeholder="Department Reference">
            </div>

            <div class="col-12 goods-only-field">
              <div class="p-3 bg-light rounded border">
                <h6 class="mb-3 font-monospace text-brand" style="font-size:13px; font-weight:600;"><i class="fas fa-truck-moving me-1"></i> LOGISTICS & MATERIAL DETAILS</h6>
                <div class="row g-3">
                  <div class="col-md-4">
                    <label class="form-label">Vehicle Number</label>
                    <input type="text" class="form-control" id="p_vehicleNo" placeholder="e.g. DXB 12345">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Driver Name</label>
                    <input type="text" class="form-control" id="p_driverName">
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Driver Mobile / ID</label>
                    <input type="text" class="form-control" id="p_driverContact">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Reference Type</label>
                    <select class="form-select" id="p_refType">
                      <option value="LPO">LPO (Purchase Order)</option>
                      <option value="DELIVERY_NOTE">Delivery Note</option>
                      <option value="INVOICE">Invoice</option>
                      <option value="OTHER">Other / Internal</option>
                    </select>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Reference Document #</label>
                    <input type="text" class="form-control" id="p_refNo" placeholder="No.">
                  </div>
                  <div class="col-12">
                    <label class="form-label">Material Description Items</label>
                    <textarea class="form-control" id="p_description" rows="2" placeholder="List itemized descriptions here..."></textarea>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12 visitor-only-field" style="display:none">
              <div class="p-3 bg-light rounded border">
                <h6 class="mb-3 font-monospace text-success" style="font-size:13px; font-weight:600;"><i class="fas fa-user-check me-1"></i> VISITATION CREDENTIALS</h6>
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Visitor Name</label>
                    <input type="text" class="form-control" id="p_vName">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Emirates ID / Passport</label>
                    <input type="text" class="form-control" id="p_vIdNo">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Purpose of Visit</label>
                    <input type="text" class="form-control" id="p_vPurpose" placeholder="Maintenance, Audit, Meeting">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Host Person Escort</label>
                    <input type="text" class="form-control" id="p_vHost" placeholder="Staff Name">
                  </div>
                  <div class="col-md-10">
                    <label class="form-label">Live Snap Identification</label>
                    <div id="cameraPreviewContainer" class="camera-box" style="display:none">
                      <video id="videoFeed" autoplay playsinline></video>
                    </div>
                    <div id="snapshotPreviewContainer" class="snapshot-preview" style="display:none">
                      <img id="snapshotImage" src="" alt="Captured Profile">
                    </div>
                  </div>
                  <div class="col-md-2 d-flex flex-column justify-content-end gap-2">
                    <button type="button" class="btn btn-outline-secondary btn-sm w-100" id="btnStartCam" onclick="startCamera()"><i class="fas fa-video"></i> Start</button>
                    <button type="button" class="btn btn-brand btn-sm w-100" id="btnCapture" onclick="captureSnapshot()" style="display:none"><i class="fas fa-camera"></i> Snap</button>
                    <button type="button" class="btn btn-outline-danger btn-sm w-100" id="btnResetCam" onclick="resetCamera()" style="display:none"><i class="fas fa-redo"></i> Retake</button>
                  </div>
                </div>
              </div>
            </div>

            <div class="col-12">
              <label class="form-label">General Remarks / Security Annotations</label>
              <textarea class="form-control" id="p_remarks" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" data-bs-dismiss="modal">Discard</button>
        <button type="button" class="btn-brand px-4" onclick="commitPassSave()">Save GatePass</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="visitorEntryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title"><i class="fas fa-user-plus me-2"></i>New Visitor Gate Entry</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <form id="visitorEntryForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label required-field">Full Name</label>
              <input type="text" class="form-control" id="ve_name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">Company / Agency</label>
              <input type="text" class="form-control" id="ve_company" required>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">ID Document Type</label>
              <select class="form-select" id="ve_idType" required>
                <option value="Emirates ID">Emirates ID Card</option>
                <option value="Passport">International Passport</option>
                <option value="Driving License">Driving License</option>
                <option value="Other">Other Official ID</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">ID Document Number</label>
              <input type="text" class="form-control" id="ve_idNo" required>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">Mobile Contact</label>
              <input type="text" class="form-control" id="ve_contact" required>
            </div>
            <div class="col-md-6">
              <label class="form-label required-field">Host Staff Contact / Department</label>
              <input type="text" class="form-control" id="ve_host" required placeholder="Person / Section">
            </div>
            <div class="col-12">
              <label class="form-label required-field">Purpose of Access Entry</label>
              <input type="text" class="form-control" id="ve_purpose" required placeholder="e.g., HVAC Maintenance, Board Meeting">
            </div>
            <div class="col-md-8">
              <label class="form-label">Visitor Identity Capture Tracking</label>
              <div id="vcameraPreviewContainer" class="camera-box" style="display:none">
                <video id="vvideoFeed" autoplay playsinline></video>
              </div>
              <div id="vsnapshotPreviewContainer" class="snapshot-preview" style="display:none">
                <img id="vsnapshotImage" src="" alt="Captured Security Log">
              </div>
            </div>
            <div class="col-md-4 d-flex flex-column justify-content-end gap-2">
              <button type="button" class="btn btn-outline-secondary btn-sm w-100" id="vbtnStartCam" onclick="startVisitorCamera()"><i class="fas fa-video"></i> Init Camera</button>
              <button type="button" class="btn btn-success btn-sm w-100" id="vbtnCapture" onclick="captureVisitorSnapshot()" style="display:none"><i class="fas fa-camera"></i> Capture Face</button>
              <button type="button" class="btn btn-outline-danger btn-sm w-100" id="vbtnResetCam" onclick="resetVisitorCamera()" style="display:none"><i class="fas fa-redo"></i> Flush Snapshot</button>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success px-4" onclick="commitVisitorEntry()">Authorize Entry</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="visitorExitModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title"><i class="fas fa-sign-out-alt me-2"></i>Process Outbound Visitor Departure</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div id="exitStep1">
          <p class="text-muted" style="font-size:14px">Search visitor by full matching name or document identity token to clear terminal exit access parameters:</p>
          <div class="input-group mb-3">
            <input type="text" id="exitSearchQuery" class="form-control" placeholder="Search Identity / Name Details...">
            <button class="btn btn-brand" onclick="lookupVisitorForExit()"><i class="fas fa-search"></i></button>
          </div>
          <div id="exitLookupResult"></div>
        </div>
        <div id="exitStep2" style="display:none"></div>
      </div>
      <div class="modal-footer" id="exitModalFooter">
        <button type="button" class="btn-outline" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="visitorDetailModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div id="visitorDetailBody" style="overflow:hidden; border-radius:var(--radius-lg) var(--radius-lg) 0 0"></div>
      <div class="modal-footer d-flex justify-content-between align-items-center">
        <div id="visitorDetailActions" class="d-flex gap-2 flex-wrap"></div>
        <button type="button" class="btn-outline" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<canvas id="captureCanvas" style="display:none"></canvas>
<canvas id="vcaptureCanvas" style="display:none"></canvas>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/api.js"></script>
<script src="/app.js"></script>
</body>
</html>
